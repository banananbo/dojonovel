scenes:
  - id: scene_danchi_morning
    location_id: loc_danchi
    background: backgrounds/danchimae.jpg
    bgm: audio/bgm/danchi.mp3
    messages: []
    branches:
      type: auto
      choices:
        - condition:
            flag: flag_left_danchi
            value: false
          next_scene: scene_danchi_intro
        - condition:
            negate: true
            has_item: item_candy
          next_scene: scene_danchi_return_obachan
        - condition: null
    child_scenes:
      - id: scene_danchi_intro
        characters:
          - character_id: char_hero
            position: left
            expression: normal
        messages:
          - text: 今日はCoderDojo赤羽の開催日だ。
            voice_character_id: char_hero
          - text: あ、田村のおばちゃん。おはようございます！
            voice_character_id: char_hero
          - text: 「ケンちゃん、また出かけるの？ほら、これ持って行きな。」
            voice_character_id: char_obachan
            characters:
              - character_id: char_hero
                position: left
                expression: normal
              - character_id: char_obachan
                position: right
                expression: normal
          - text: アメちゃんをもらった！
            voice_character_id: null
        item_give:
          - item_id: item_suica
            condition: null
          - item_id: item_candy
            condition: null
        flags_set:
          - flag: flag_left_danchi
            value: true
        clickable_areas:
          - id: area_mailbox
            x: 187
            "y": 306
            width: 80
            height: 100
            label: 郵便受け
            next_scene: scene_examine_mailbox
            condition: null
          - id: area_danchi_funsui
            x: 339
            "y": 366
            width: 110
            height: 103
            label: 噴水
            next_scene: scene_examine_fountain
            condition: null
          - id: area_nazo01
            x: 450
            "y": 361
            width: 50
            height: 70
            label: "??"
            next_scene: scene_examine_hatena
            condition: null
        talkable:
          - character_id: char_obachan
            scene_id: scene_talk_danchi
        branches:
          type: none
      - id: scene_danchi_return_obachan
        characters:
          - character_id: char_hero
            position: left
            expression: normal
          - character_id: char_obachan
            position: right
            expression: normal
        commands:
          - cmd_examine
          - cmd_talk
          - cmd_move
          - cmd_inventory
        talkable:
          - character_id: char_obachan
            scene_id: scene_talk_danchi_give_candy
        messages:
          - text: おばちゃんが立っていた。
            voice_character_id: null
      - id: scene_talk_danchi_give_candy
        characters:
          - character_id: char_hero
            position: left
            expression: normal
          - character_id: char_obachan
            position: right
            expression: normal
        messages:
          - text: 「ケンちゃん、アメ食べちゃった？ほら、もう一個あるよ。」
            voice_character_id: char_obachan
          - text: アメをもらった！
            voice_character_id: null
        item_give:
          - item_id: item_candy
            condition: null
        next_scene: null
      - id: scene_examine_mailbox
        messages:
          - text: ケンの家の郵便受けだ。今日は特に何も入っていない。
            voice_character_id: null
        next_scene: null
      - id: scene_examine_fountain
        messages:
          - text: こんなところに噴水あったかな。
            voice_character_id: null
          - text: ほかに変わった情報はなさそうだ。
            voice_character_id: null
        next_scene: null
      - id: scene_talk_danchi
        messages:
          - text: 「ケンちゃん、気をつけてね。帰りが遅くなるんなら連絡しなさいよ。」
            voice_character_id: char_obachan
        next_scene: null
      - id: scene_examine_hatena
        messages:
          - text: |-
              なんだこれ　犬・・？
              まあいいか
            voice_character_id: char_hero
        location_id: loc_danchi
        next_scene: null
  - id: scene_station_default
    location_id: loc_station
    background: backgrounds/akabane.jpg
    bgm: audio/bgm/station.mp3
    characters:
      - character_id: char_hero
        position: left
        expression: normal
    messages:
      - text: 赤羽駅の改札を出たところだ。
        voice_character_id: null
      - text: 休日の昼間、人が多く賑わっている。
        voice_character_id: null
    clickable_areas:
      - id: area_station_hiroba
        x: 254
        "y": 340
        width: 100
        height: 88
        label: 広場
        next_scene: scene_examine_station_hiroba
        condition: null
      - id: area_nazo02
        x: 397
        "y": 356
        width: 38
        height: 42
        label: ？？
        next_scene: scene_examine_station_nazo
        condition: null
    talkable:
      - character_id: char_yui
        scene_id: scene_talk_station
    branches:
      type: none
    child_scenes:
      - id: scene_examine_station_hiroba
        messages:
          - text: 駅前の広場を見た。
            voice_character_id: null
          - text: ゴミが落ちているなかに、見覚えのあるチラシがある。
            voice_character_id: null
          - text: 「CoderDojo赤羽　本日開催！　参加無料　午前9時30分より」
            voice_character_id: null
          - text: チラシを一枚拾った！
            voice_character_id: null
        item_give:
          - item_id: item_flyer
            condition: null
        flags_set:
          - flag: flag_station_explored
            value: true
          - flag: flag_got_flyer
            value: true
        next_scene: null
      - id: scene_examine_station_nazo
        messages:
          - text: あれはなんだろう。。
            voice_character_id: null
          - text: なんでもいいか、、
            voice_character_id: null
        next_scene: null
      - id: scene_talk_station
        messages:
          - text: 辺りを見回すと……
            voice_character_id: null
        branches:
          type: auto
          choices:
            - label: ""
              condition:
                flag: flag_met_yui
                value: true
              next_scene: scene_yui_already_met
            - label: ""
              condition: null
              next_scene: scene_meet_yui
        child_scenes:
          - id: scene_meet_yui
            characters:
              - character_id: char_yui
                position: center
                expression: surprise
            messages:
              - text: 後ろから声がした。
                voice_character_id: null
              - text: 「あっ、ケンじゃん！やっぱりいた。」
                voice_character_id: char_yui
                voice_style: normal
              - text: 「今日CoderDojo行くでしょ？チラシもう見た？」
                voice_character_id: char_yui
                voice_style: normal
            branches:
              type: choice
              choices:
                - label: 「うん、見たよ。一緒に行こう！」
                  condition:
                    flag: flag_station_explored
                    value: true
                  next_scene: scene_yui_lets_go
                - label: 「あ、まだ見てない。ちょっと待ってて」
                  condition: null
                  next_scene: null
            child_scenes:
              - id: scene_yui_lets_go
                characters:
                  - character_id: char_yui
                    position: center
                    expression: happy
                messages:
                  - text: 「やった！じゃ行こう！CoderDojo楽しみだね！」
                    voice_character_id: char_yui
                    voice_style: normal
                  - text: ユイと合流した。
                    voice_character_id: null
                flags_set:
                  - flag: flag_met_yui
                    value: true
                branches:
                  type: none
          - id: scene_yui_already_met
            characters:
              - character_id: char_yui
                position: right
                expression: happy
            messages:
              - text: 「はーやーくー！行こうよ！」
                voice_character_id: char_yui
                voice_style: normal
            next_scene: null
  - id: scene_coderdojo_default
    location_id: loc_coderdojo
    background: backgrounds/coderdojo.jpg
    bgm: audio/bgm/coderdojo.mp3
    characters:
      - character_id: char_hero
        position: left
        expression: normal
      - character_id: char_mentor
        position: right
        expression: normal
    messages:
      - text: CoderDojo赤羽の会場に着いた。
        voice_character_id: null
      - text: 広い部屋に子どもたちが集まって、みんなノートパソコンを開いている。
        voice_character_id: null
      - text: 「ケンくん、いらっしゃい！今日もよろしくね。」
        voice_character_id: char_mentor
        voice_style: normal
    clickable_areas:
      - id: area_whiteboard
        x: 339
        "y": 186
        width: 135
        height: 78
        label: ホワイトボード
        next_scene: scene_examine_whiteboard
        condition: null
      - id: area_kids
        x: 457
        "y": 267
        width: 290
        height: 133
        label: 子供たち
        next_scene: scene_examine_coderdojo_pcs
        condition: null
    flags_set:
      - flag: flag_arrived_coderdojo
        value: true
    talkable:
      - character_id: char_mentor
        scene_id: scene_talk_coderdojo
    branches:
      type: none
    child_scenes:
      - id: scene_examine_whiteboard
        messages:
          - text: ホワイトボードに「今日のテーマ：自由制作！」と書かれている。
            voice_character_id: null
          - text: 何を作ろうか……
            voice_character_id: null
        next_scene: null
      - id: scene_examine_coderdojo_pcs
        messages:
          - text: ノートパソコンがずらりと並んでいる。
            voice_character_id: null
          - text: 隣の子のコードが見えた。ゲームっぽいものを作っているみたい。
            voice_character_id: null
        next_scene: null
      - id: scene_talk_coderdojo
        messages:
          - text: 「今日のテーマは自由制作だよ。何か作りたいものある？」
            voice_character_id: char_mentor
            voice_style: normal
        branches:
          type: choice
          choices:
            - label: 「ゲームを作りたいです！」
              condition: null
              next_scene: scene_mentor_game_talk
            - label: 「まだ考え中です……」
              condition: null
              next_scene: scene_mentor_encouragement
        child_scenes:
          - id: scene_mentor_game_talk
            messages:
              - text: 「ゲームか！いいね！じゃあまず、どんなゲームにしたいか紙に描いてみよう。」
                voice_character_id: char_mentor
                voice_style: normal
              - text: 「作りたいものが決まったら、一緒に考えよう。」
                voice_character_id: char_mentor
                voice_style: normal
              - text: こうしてぼくのCoderDojoが始まった。
                voice_character_id: null
            flags_set:
              - flag: flag_met_mentor
                value: true
            next_scene: null
          - id: scene_mentor_encouragement
            messages:
              - text: 「大丈夫、焦らなくていいよ。まわりを見てインスピレーションを探してみて。」
                voice_character_id: char_mentor
                voice_style: normal
            flags_set:
              - flag: flag_met_mentor
                value: true
            next_scene: null
  - id: scene_use_candy
    overlay_image: cg/candy_happy.jpg
    messages:
      - text: アメをなめた。
        voice_character_id: null
      - text: 甘くておいしい。
        voice_character_id: null
      - text: ……なんだか、すごく幸せな気持ちになった。
        voice_character_id: char_hero
    next_scene: null

  - id: scene_slope_default
    location_id: loc_slope
    background: backgrounds/slope_day.jpg
    bgm: audio/bgm/piano.mp3
    characters:
      - character_id: char_hero
        position: left
        expression: normal
    messages:
      - text: 道場が終わったあと、ぼくはなんとなく坂道を歩いていた。
        voice_character_id: null
      - text: CoderDojoで教わったこと、ゲームを作るってどんな感じなんだろう。
        voice_character_id: char_hero
      - text: 坂の途中から、団地の建物が並ぶ景色が見えた。
        voice_character_id: null
      - text: ……なんか、飽きてきたな。
        voice_character_id: char_hero
    clickable_areas:
      - id: area_slope_view
        x: 300
        "y": 200
        width: 200
        height: 150
        label: 坂の眺め
        next_scene: scene_examine_slope_view
        condition: null
    branches:
      type: none
    child_scenes:
      - id: scene_examine_slope_view
        messages:
          - text: 赤羽の街が見渡せる。団地、線路、遠くにビル。
            voice_character_id: null
          - text: ここから見ると、自分がいつも歩いてる場所がちっぽけに見える。
            voice_character_id: char_hero
        next_scene: null
